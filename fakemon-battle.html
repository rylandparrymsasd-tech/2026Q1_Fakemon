<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fakemon Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0d1a;
  --surface: #161628;
  --card:    #1e1e38;
  --border:  #2e2e50;
  --accent:  #f5c842;
  --text:    #e8e8f0;
  --muted:   #7070a0;
  --green:   #56c87a;
  --orange:  #e8943a;
  --red:     #e85d5d;
  --px: 'Press Start 2P', monospace;
  --ui: 'DM Sans', sans-serif;
  --r: 10px;
  --rs: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ui);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 48px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
  pointer-events: none;
  z-index: 999;
}
h1 {
  font-family: var(--px);
  font-size: clamp(10px, 2.5vw, 15px);
  color: var(--accent);
  letter-spacing: 2px;
  margin-bottom: 4px;
  text-align: center;
  text-shadow: 0 0 20px rgba(245,200,66,0.4);
}
.subtitle { font-size: 12px; color: var(--muted); margin-bottom: 24px; text-align: center; }
.hidden { display: none !important; }
#screen-select, #screen-battle, #screen-over { width: 100%; max-width: 660px; }

/* ── HOME LINK ── */
.home-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--px); font-size: 8px; color: var(--muted);
  text-decoration: none; letter-spacing: 1px;
  border: 1px solid var(--border); border-radius: var(--rs);
  padding: 6px 10px; margin-bottom: 16px;
  transition: color 0.15s, border-color 0.15s;
}
.home-link:hover { color: var(--accent); border-color: var(--accent); }

/* ── LOADING ── */
#screen-loading {
  text-align: center;
  padding: 60px 0;
  font-family: var(--px);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* ═══════════════════════════════════════════════════════════════
   DEBUG WINDOW  (colored + filter tabs)
═══════════════════════════════════════════════════════════════ */
#debug-panel {
  width: 100%; max-width: 660px;
  background: #060610;
  border: 1.5px solid #3a2a60;
  border-radius: var(--r);
  margin-bottom: 18px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  overflow: hidden;
}
#debug-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 12px;
  background: #10082a;
  cursor: pointer;
  user-select: none;
  gap: 8px;
}
#debug-header-label {
  font-family: var(--px); font-size: 7px; color: #a080f0; letter-spacing: 1px;
  white-space: nowrap;
}
#debug-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.debug-filter-btn {
  font-family: var(--px); font-size: 6px; letter-spacing: 0.5px;
  background: none; border: 1px solid #3a2a60; border-radius: 4px;
  padding: 3px 7px; cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.debug-filter-btn.active  { border-color: currentColor; filter: brightness(1.4); }
.debug-filter-btn.active.f-all      { color: #c0c0e0; }
.debug-filter-btn.active.f-info     { color: #80c0ff; }
.debug-filter-btn.active.f-battle   { color: #60d090; }
.debug-filter-btn.active.f-ok       { color: #56c87a; }
.debug-filter-btn.active.f-warn     { color: #f5c842; }
.debug-filter-btn.active.f-error    { color: #e85d5d; }
.debug-filter-btn:not(.active)      { color: #444468; }
#debug-toggle {
  font-family: var(--px); font-size: 7px; color: #7060b0;
  background: none; border: 1px solid #3a2a60; border-radius: 4px;
  padding: 3px 8px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
#debug-toggle:hover { color: #a080f0; border-color: #a080f0; }
#debug-body {
  padding: 10px 14px;
  max-height: 260px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
#debug-body.collapsed { display: none; }
.dlog {
  padding: 3px 6px; line-height: 1.5;
  border-bottom: 1px solid #0e0a1e;
  border-radius: 3px;
  display: flex; gap: 8px; align-items: baseline;
}
.dlog:last-child { border-bottom: none; }
.dlog-ts   { color: #3a3460; font-size: 10px; white-space: nowrap; flex-shrink: 0; }
.dlog-icon { flex-shrink: 0; }
.dlog-msg  { flex: 1; word-break: break-word; }

/* Type colours */
.dlog-info   { background: rgba(0,80,160,0.12); }
.dlog-info   .dlog-icon, .dlog-info   .dlog-msg { color: #80c0ff; }
.dlog-ok     { background: rgba(0,100,60,0.14); }
.dlog-ok     .dlog-icon, .dlog-ok     .dlog-msg { color: #56c87a; }
.dlog-warn   { background: rgba(140,100,0,0.16); }
.dlog-warn   .dlog-icon, .dlog-warn   .dlog-msg { color: #f5c842; font-weight: 600; }
.dlog-error  { background: rgba(160,20,20,0.20); }
.dlog-error  .dlog-icon, .dlog-error  .dlog-msg { color: #ff6060; font-weight: 700; }
.dlog-score  { background: rgba(120,60,160,0.14); }
.dlog-score  .dlog-icon, .dlog-score  .dlog-msg { color: #d890ff; }
.dlog-battle { background: rgba(30,100,60,0.12); }
.dlog-battle .dlog-icon, .dlog-battle .dlog-msg { color: #60d090; }
/* hidden by filter */
.dlog.filtered-out { display: none; }

#debug-tabs { padding: 6px 10px; background: #0a0616; display: flex; gap: 4px; flex-wrap: wrap; }
#debug-clear {
  font-family: var(--px); font-size: 6px; color: #503060;
  background: none; border: 1px solid #2a1040; border-radius: 4px;
  padding: 3px 8px; cursor: pointer; transition: color 0.15s;
}
#debug-clear:hover { color: #a080f0; }
#debug-count { color: #5040a0; font-size: 9px; }

/* ── SELECT ── */
#screen-select h2 {
  font-family: var(--px);
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-bottom: 16px;
  text-align: center;
}
.fakemon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 10px;
}
.fakemon-choice {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 14px 12px 10px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
  text-align: center;
}
.fakemon-choice:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(245,200,66,0.12); }
.fakemon-choice.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent), 0 6px 20px rgba(245,200,66,0.18); }
.choice-emoji { font-size: 38px; display: block; margin-bottom: 8px; }
.choice-name { font-family: var(--px); font-size: 7px; color: var(--text); margin-bottom: 4px; letter-spacing: 1px; }
.choice-type { font-size: 10px; color: var(--muted); }
.choice-power { font-size: 10px; color: var(--accent); margin-top: 4px; }

#matchup-hint { text-align:center; font-size:12px; margin:10px 0; min-height:20px; }
#matchup-hint.fair   { color:#56c87a; }
#matchup-hint.uneven { color:#e8943a; }
#matchup-hint.hard   { color:#e85d5d; }

#start-btn {
  display:block; width:100%; margin-top:12px;
  font-family:var(--px); font-size:9px; letter-spacing:2px;
  padding:14px; background:var(--accent); color:var(--bg);
  border:none; border-radius:var(--r); cursor:pointer; transition:background 0.15s;
}
#start-btn:disabled { background:#2e2e50; color:#555580; cursor:default; }
#start-btn:not(:disabled):hover { background:#ffd655; }

/* ── BATTLE ── */
.battle-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap: 6px; }
.turn-badge { font-family:var(--px); font-size:7px; color:var(--muted); letter-spacing:1px; }
.arena { display:grid; grid-template-columns:1fr auto 1fr; gap:8px; align-items:center; margin-bottom:10px; }
.fighter-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--r); padding:12px; }
.fighter-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:2px; }
.fighter-name { font-family:var(--px); font-size:7px; color:var(--text); letter-spacing:1px; }
.fighter-type { font-size:9px; font-weight:600; padding:1px 6px; border-radius:12px; }
.fighter-emoji-wrap { text-align:center; padding:8px 0; font-size:44px; line-height:1; transition:transform 0.12s ease; }
.fighter-emoji-wrap.pop { transform:scale(1.35) rotate(-5deg); }
.fighter-card.enemy .fighter-emoji-wrap.pop { transform:scale(1.35) rotate(5deg); }
.hp-label { font-size:10px; color:var(--muted); display:flex; justify-content:space-between; margin-bottom:4px; }
.hp-track { background:#111122; border-radius:4px; height:8px; overflow:hidden; margin-bottom:6px; border:1px solid var(--border); }
.hp-fill { height:100%; border-radius:4px; transition:width 0.4s ease, background 0.4s ease; }
.stat-row { display:flex; gap:4px; margin-bottom:4px; flex-wrap:wrap; }
.stat-mini { font-size:8px; color:var(--muted); white-space:nowrap; }
.stat-mini span { color:var(--text); font-weight:600; }
.statuses { display:flex; flex-wrap:wrap; gap:4px; min-height:24px; }

/* ── STATUS CHIPS with color-coded glow pulse ── */
.status-chip {
  font-size:9px; font-weight:700; padding:3px 8px; border-radius:6px;
  border: 1.5px solid; animation: statusPulse 2.2s ease-in-out infinite;
}
@keyframes statusPulse {
  0%, 100% { filter: brightness(1); box-shadow: 0 0 4px currentColor; opacity: 0.95; }
  50%       { filter: brightness(1.35); box-shadow: 0 0 12px currentColor; opacity: 1; }
}
.status-poison   { background:#1e0a2e; color:#c060f0; border-color:#b07edc; }
.status-burn     { background:#2e0e08; color:#ff7050; border-color:#e85d5d; }
.status-paralyze { background:#2a2200; color:#f5c842; border-color:#f5c842; }
.status-sleep    { background:#0e1030; color:#80a0f0; border-color:#6080d0; }
.status-confuse  { background:#2a1020; color:#f080b0; border-color:#d06090; }
.status-statup   { background:#0a2010; color:#56c87a; border-color:#56c87a; }
.status-statdwn  { background:#2a0e0e; color:#e85d5d; border-color:#e85d5d; }
.status-flinch   { background:#1a1a10; color:#c8c060; border-color:#c8c060; }

.vs-col { text-align:center; }
.vs-text { font-family:var(--px); font-size:8px; color:var(--muted); }
.power-diff { font-size:8px; color:var(--muted); margin-top:4px; display:block; }

.type-super { color:#56c87a; font-weight:700; }
.type-weak  { color:#e85d5d; font-weight:700; }

.log-box {
  background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r);
  padding:12px 14px; min-height:64px; font-size:12px; color:var(--text);
  line-height:1.7; margin-bottom:10px;
}
.moves-label { font-family:var(--px); font-size:7px; color:var(--muted); letter-spacing:1px; margin-bottom:8px; }
.moves-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
.move-btn {
  background:var(--card); border:1.5px solid var(--border); border-radius:var(--rs);
  padding:8px 10px; cursor:pointer; text-align:left;
  transition:border-color 0.12s, background 0.12s, transform 0.08s;
  font-family:var(--ui);
}
.move-btn:hover:not(:disabled) { border-color:var(--accent); background:#1f1f38; transform:translateY(-1px); }
.move-btn:active:not(:disabled) { transform:scale(0.98); }
.move-btn:disabled { opacity:0.3; cursor:default; }
.move-btn .mn { font-size:12px; font-weight:600; color:var(--text); margin-bottom:2px; }
.move-btn .md { font-size:10px; color:var(--muted); }
.move-btn .ms { font-size:9px; color:#444466; margin-top:1px; }

.speed-fast   { color: #56c87a; }
.speed-medium { color: #f5c842; }
.speed-slow   { color: #e85d5d; }

.battle-footer { display:flex; justify-content:space-between; align-items:center; }
.icon-btn {
  font-size:10px; font-family:var(--px); color:var(--muted);
  background:none; border:1px solid var(--border); border-radius:var(--rs);
  padding:6px 10px; cursor:pointer; letter-spacing:1px;
  transition:color 0.15s, border-color 0.15s;
}
.icon-btn:hover { color:var(--accent); border-color:var(--accent); }
.icon-btn.home-btn:hover { color: #80d8f0; border-color: #80d8f0; }

/* ── OVER ── */
#screen-over {
  text-align:center; padding:40px 20px;
  background:var(--card); border:1.5px solid var(--border); border-radius:var(--r);
}
#over-result { font-family:var(--px); font-size:clamp(10px,3vw,18px); margin-bottom:14px; line-height:1.6; }
#over-details { font-size:12px; color:var(--muted); margin-bottom:8px; }
#over-msg { font-size:13px; color:var(--muted); margin-bottom:24px; line-height:1.7; }
#play-again-btn {
  font-family:var(--px); font-size:9px; letter-spacing:2px;
  padding:12px 24px; background:var(--accent); color:var(--bg);
  border:none; border-radius:var(--r); cursor:pointer; transition:background 0.15s;
  margin-right: 10px;
}
#play-again-btn:hover { background:#ffd655; }
#home-from-over {
  font-family:var(--px); font-size:9px; letter-spacing:2px;
  padding:12px 24px; background: transparent; color: var(--muted);
  border: 1px solid var(--border); border-radius:var(--r); cursor:pointer; transition: all 0.15s;
  text-decoration: none; display: inline-block;
}
#home-from-over:hover { color: var(--accent); border-color: var(--accent); }

@media(max-width:480px) {
  .arena { gap:4px; }
  .fighter-card { padding:8px; }
  .fighter-emoji-wrap { font-size:34px; }
}

/* ── Type chip colours ── */
.type-Fire     { background:#3a1200; color:#ff8050; border:1px solid #cc4422; }
.type-Water    { background:#0a1a3a; color:#60b0ff; border:1px solid #2255cc; }
.type-Air      { background:#0a2a1a; color:#70e0a0; border:1px solid #22aa66; }
.type-Earth    { background:#1a1200; color:#c0a050; border:1px solid #886622; }
.type-Electric { background:#2a2000; color:#f5c842; border:1px solid #cc9900; }
.type-Ice      { background:#0a1e2a; color:#a0e0f0; border:1px solid #3399bb; }
.type-Poison   { background:#1a0a2a; color:#c060f0; border:1px solid #9933cc; }
.type-Dark     { background:#0e0e18; color:#9090c0; border:1px solid #555580; }
.type-Ghost    { background:#150e28; color:#b080f0; border:1px solid #7755cc; }
.type-Metal    { background:#181a22; color:#a0b0c0; border:1px solid #6688aa; }
.type-Nature   { background:#0a1e0a; color:#70d060; border:1px solid #448844; }
.type-Normal   { background:#1a1a2a; color:#9090b0; border:1px solid #555570; }
</style>
</head>
<body>

<a href="index.html" class="home-link">← HOME</a>
<h1>⚔ FAKEMON BATTLE</h1>
<p class="subtitle">choose your fighter</p>

<!-- ═══════════════════════════════════════════════════════
     DEBUG PANEL  — colored + filterable
     Students: this panel helps you spot problems in your
     JSON file. Use the filter tabs to find errors quickly!
════════════════════════════════════════════════════════ -->
<div id="debug-panel">
  <div id="debug-header" onclick="toggleDebug()">
    <span id="debug-header-label">🐛 DEBUG <span id="debug-count">(0)</span></span>
    <div id="debug-controls" onclick="event.stopPropagation()">
      <!-- filter tabs -->
      <button class="debug-filter-btn f-all active"    onclick="setFilter('all')">ALL</button>
      <button class="debug-filter-btn f-info"          onclick="setFilter('info')">ℹ INFO</button>
      <button class="debug-filter-btn f-battle"        onclick="setFilter('battle')">⚔ BATTLE</button>
      <button class="debug-filter-btn f-ok"            onclick="setFilter('ok')">✓ OK</button>
      <button class="debug-filter-btn f-warn"          onclick="setFilter('warn')">⚠ WARN</button>
      <button class="debug-filter-btn f-error"         onclick="setFilter('error')">✗ ERROR</button>
      <button id="debug-clear"                         onclick="clearDebug()">CLEAR</button>
      <button id="debug-toggle">HIDE ▲</button>
    </div>
  </div>
  <div id="debug-body"></div>
</div>

<div id="screen-loading">loading fakemon…</div>

<div id="screen-select" class="hidden">
  <h2>▸ pick your fakemon</h2>
  <div class="fakemon-grid" id="fakemon-grid"></div>
  <div id="matchup-hint"></div>
  <button id="start-btn" disabled>▶ BATTLE!</button>
</div>

<div id="screen-battle" class="hidden">
  <div class="battle-header">
    <button class="icon-btn home-btn" onclick="if(confirm('Return to home?'))window.location.href='index.html'">🏠 HOME</button>
    <span class="turn-badge" id="turn-label">TURN 1</span>
    <button class="icon-btn" id="flee-btn">✕ FLEE</button>
  </div>
  <div class="arena">
    <div class="fighter-card" id="player-card">
      <div class="fighter-top">
        <span class="fighter-name" id="player-name">—</span>
        <span class="fighter-type" id="player-type"></span>
      </div>
      <div class="fighter-emoji-wrap" id="player-emoji"></div>
      <div class="hp-label"><span>HP</span><span id="player-hp-text">—</span></div>
      <div class="hp-track"><div class="hp-fill" id="player-hp-bar"></div></div>
      <div class="stat-row" id="player-stats"></div>
      <div class="statuses" id="player-statuses"></div>
    </div>
    <div class="vs-col">
      <div class="vs-text">VS</div>
      <span class="power-diff" id="power-diff-label"></span>
    </div>
    <div class="fighter-card enemy">
      <div class="fighter-top">
        <span class="fighter-name" id="enemy-name">—</span>
        <span class="fighter-type" id="enemy-type"></span>
      </div>
      <div class="fighter-emoji-wrap" id="enemy-emoji"></div>
      <div class="hp-label"><span>HP</span><span id="enemy-hp-text">—</span></div>
      <div class="hp-track"><div class="hp-fill" id="enemy-hp-bar"></div></div>
      <div class="stat-row" id="enemy-stats"></div>
      <div class="statuses" id="enemy-statuses"></div>
    </div>
  </div>
  <div class="log-box" id="log">…</div>
  <div class="moves-label">▸ your moves</div>
  <div class="moves-grid" id="moves-grid"></div>
  <div class="battle-footer">
    <span class="turn-badge" id="turn-label2">TURN 1</span>
  </div>
</div>

<div id="screen-over" class="hidden">
  <div id="over-result"></div>
  <div id="over-details"></div>
  <p id="over-msg"></p>
  <button id="play-again-btn">▶ PLAY AGAIN</button>
  <a href="index.html" id="home-from-over">🏠 HOME</a>
</div>

<script src="score.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════════
//  DEBUG SYSTEM
//  Students: Use dlog(message, type) anywhere in this file to print
//  a message to the debug panel above!
//
//  Types:
//    'info'   — general info (blue)       e.g. dlog('Game started', 'info')
//    'ok'     — success (green)           e.g. dlog('File loaded!', 'ok')
//    'warn'   — warning (yellow)          e.g. dlog('Missing field', 'warn')
//    'error'  — something broke (red)     e.g. dlog('File not found!', 'error')
//    'battle' — battle events (teal)      e.g. dlog('Turn 1 started', 'battle')
//    'score'  — scoring/calc (purple)     e.g. dlog('Power = 72', 'score')
// ════════════════════════════════════════════════════════════════════════

let debugCollapsed = false;
let debugMsgCount  = 0;
let activeFilter   = 'all';

const DEBUG_ICONS = { info:'ℹ', ok:'✓', warn:'⚠', error:'✗', score:'⭐', battle:'⚔' };

function dlog(msg, type = 'info') {
  debugMsgCount++;
  const body = document.getElementById('debug-body');
  const el   = document.createElement('div');
  el.className = `dlog dlog-${type}`;
  el.dataset.type = type;

  const ts     = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const icon   = DEBUG_ICONS[type] || 'ℹ';

  el.innerHTML = `<span class="dlog-ts">[${ts}]</span><span class="dlog-icon">${icon}</span><span class="dlog-msg">${escHtmlDebug(String(msg))}</span>`;

  // Apply current filter
  if (activeFilter !== 'all' && type !== activeFilter) {
    el.classList.add('filtered-out');
  }

  body.appendChild(el);
  body.scrollTop = body.scrollHeight;

  // Update count badge
  const visible = body.querySelectorAll('.dlog:not(.filtered-out)').length;
  document.getElementById('debug-count').textContent = `(${debugMsgCount} total, ${visible} shown)`;

  // Mirror to real browser console (useful if devtools ever available)
  if (type === 'error') console.error(`[FAKEMON] ${msg}`);
  else if (type === 'warn') console.warn(`[FAKEMON] ${msg}`);
  else console.log(`[FAKEMON][${type}] ${msg}`);
}

function escHtmlDebug(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleDebug() {
  debugCollapsed = !debugCollapsed;
  document.getElementById('debug-body').classList.toggle('collapsed', debugCollapsed);
  document.getElementById('debug-toggle').textContent = debugCollapsed ? 'SHOW ▼' : 'HIDE ▲';
}

function clearDebug() {
  document.getElementById('debug-body').innerHTML = '';
  debugMsgCount = 0;
  document.getElementById('debug-count').textContent = '(0 total, 0 shown)';
  dlog('Debug log cleared.', 'info');
}

// Filter tabs — click a tab to show only that type of message
function setFilter(type) {
  activeFilter = type;

  // Update tab button styles
  document.querySelectorAll('.debug-filter-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  const activeBtn = document.querySelector(`.debug-filter-btn.f-${type}`);
  if (activeBtn) activeBtn.classList.add('active');

  // Show/hide existing messages
  document.querySelectorAll('.dlog').forEach(el => {
    const t = el.dataset.type || 'info';
    el.classList.toggle('filtered-out', type !== 'all' && t !== type);
  });

  // Update visible count
  const body = document.getElementById('debug-body');
  const visible = body.querySelectorAll('.dlog:not(.filtered-out)').length;
  document.getElementById('debug-count').textContent = `(${debugMsgCount} total, ${visible} shown)`;

  dlog(`Filter set to: ${type}`, 'info');
}

// ════════════════════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════════════════════

const STATUS_EMOJI = {
  poison:'🟣', burn:'🔴', paralyze:'⚡',
  sleep:'💤',  confuse:'😵', statup:'📈', statdwn:'📉', flinch:'😦',
};
const STATUS_CHIP_CLASS = {
  poison:'status-poison', burn:'status-burn', paralyze:'status-paralyze',
  sleep:'status-sleep', confuse:'status-confuse', statup:'status-statup',
  statdwn:'status-statdwn', flinch:'status-flinch',
};
const PRIMARY_STATUSES = ['poison', 'burn', 'paralyze', 'sleep'];
const SPEED_ORDER = { fast: 1, medium: 2, slow: 3 };
const SPEED_MULT  = { fast: 1.15, medium: 1.0, slow: 0.88 };

// ════════════════════════════════════════════════════════════════════════
//  MULTI-STATUS HELPER
//  Reads a move's statuses in either old (status field) or new
//  (statuses array) format and returns a unified array.
// ════════════════════════════════════════════════════════════════════════
function getMoveStatuses(move) {
  if (Array.isArray(move.statuses) && move.statuses.length > 0) {
    return move.statuses;
  }
  if (move.status) {
    return [{ status: move.status, statusChance: move.statusChance ?? 1.0, statTarget: move.statTarget ?? null }];
  }
  return [];
}

// ════════════════════════════════════════════════════════════════════════
//  MATCHMAKING
// ════════════════════════════════════════════════════════════════════════

function pickEnemy(player, allFakemon) {
  const candidates = allFakemon
    .filter(f => f.id !== player.id)
    .sort((a, b) => Math.abs(a._power - player._power) - Math.abs(b._power - player._power));
  const pool = candidates.slice(0, Math.min(2, candidates.length));
  return pool[Math.floor(Math.random() * pool.length)];
}

function matchupLabel(pPow, ePow) {
  const diff = Math.abs(pPow - ePow);
  if (diff <= 10) return { text: '⚖️ Balanced matchup!',        cls: 'fair'   };
  if (diff <= 25) return { text: '⚠️ Slightly uneven matchup.',  cls: 'uneven' };
  return               { text: '💀 Tough matchup — good luck.', cls: 'hard'   };
}

//  LOAD FAKEMON
// ════════════════════════════════════════════════════════════════════════

let ALL_FAKEMON  = [];
let selectedId   = null;
let state        = null;

async function loadAll() {
  dlog('Loading fakemonlist.json…', 'info');
  console.log('[DEBUG] loadAll() function started');
  
  let list;
  try {
    console.log('[DEBUG] Attempting to fetch: fakemon/fakemonlist.json');
    const r = await fetch('fakemon/fakemonlist.json');
    
    console.log('[DEBUG] Fetch response status:', r.status, r.statusText);
    console.log('[DEBUG] Response OK?', r.ok);
    
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    
    const data = await r.json();
    console.log('[DEBUG] Raw JSON data received:', data);
    console.log('[DEBUG] Type of data:', typeof data);
    console.log('[DEBUG] Is data an array?', Array.isArray(data));
    
    // Extract the fakemon array from the object
    if (data.fakemon && Array.isArray(data.fakemon)) {
      console.log('[DEBUG] Found fakemon array in data.fakemon');
      list = data.fakemon;
      console.log('[DEBUG] Original fakemon names:', list);
      
      // Add .json extension to each filename
      list = list.map(name => {
        const withExtension = name.endsWith('.json') ? name : `${name}.json`;
        console.log(`[DEBUG] Mapping: "${name}" -> "${withExtension}"`);
        return withExtension;
      });
      
      console.log(`[DEBUG] Processed ${list.length} fakemon names with .json extension`);
    } else if (Array.isArray(data)) {
      console.log('[DEBUG] Data is directly an array');
      list = data;
    } else {
      console.error('[DEBUG] Unexpected JSON structure:', data);
      throw new Error('JSON does not contain a fakemon array');
    }
    
    console.log('[DEBUG] Final list array:', list);
    dlog(`fakemonlist.json OK — ${list.length} entries found`, 'ok');
    
  } catch(e) {
    console.error('[DEBUG] Error:', e);
    dlog(`FAILED to load fakemonlist.json: ${e.message}`, 'error');
    document.getElementById('screen-loading').textContent = '⚠ Could not load fakemonlist.json';
    return;
  }

  if (!Array.isArray(list) || list.length === 0) {
    console.error('[DEBUG] Invalid list:', list);
    dlog('fakemonlist.json has no valid entries!', 'error');
    document.getElementById('screen-loading').textContent = '⚠ No Fakemon found';
    return;
  }

  console.log(`[DEBUG] Loading ${list.length} Fakemon files...`);
  
  const results = await Promise.allSettled(
    list.map(filename => loadOneFakemon(filename))
  );

  results.forEach((result, i) => {
    if (result.status === 'fulfilled' && result.value) {
      ALL_FAKEMON.push(result.value);
      console.log(`[DEBUG] Loaded: ${result.value.name}`);
    } else {
      console.error(`[DEBUG] Failed: ${list[i]}`, result.reason);
    }
  });

  dlog(`Loaded ${ALL_FAKEMON.length} / ${list.length} Fakemon successfully`, ALL_FAKEMON.length > 0 ? 'ok' : 'error');

  if (ALL_FAKEMON.length < 2) {
    dlog('Need at least 2 valid Fakemon to start a battle!', 'error');
    document.getElementById('screen-loading').textContent = '⚠ Need at least 2 valid Fakemon.';
    return;
  }

  buildSelectScreen();
  show('screen-select');
}

async function loadOneFakemon(filename) {
  dlog(`Loading fakemon/${filename}…`, 'info');
  try {
    const r = await fetch(`fakemon/${filename}`);
    if (!r.ok) throw new Error(`HTTP ${r.status} for fakemon/${filename}`);
    const data = await r.json();

    // Validate
    const { errors, warnings } = FakemonScorer.validateFakemon(data);
    warnings.forEach(w => dlog(`  ⚠ ${filename}: ${w}`, 'warn'));
    if (errors.length > 0) {
      errors.forEach(e => dlog(`  ✗ ${filename}: ${e}`, 'error'));
      dlog(`  ${filename} has ${errors.length} error(s) — skipping`, 'error');
      return null;
    }

    // Power level
    const power = FakemonScorer.calcPowerLevel(data);
    data._power = power;
    dlog(`  ${data.name} loaded — power level: ${power}`, 'score');
    return data;
  } catch(e) {
    dlog(`FAILED to load ${filename}: ${e.message}`, 'error');
    return null;
  }
}

function buildSelectScreen() {
  const grid = document.getElementById('fakemon-grid');
  grid.innerHTML = '';
  ALL_FAKEMON.forEach(f => {
    const card = document.createElement('div');
    card.className = 'fakemon-choice';
    card.dataset.id = f.id;
    card.innerHTML = `
      <span class="choice-emoji">${f.emoji || '❓'}</span>
      <div class="choice-name">${f.name}</div>
      <div class="choice-type">${f.type || ''}</div>
      <div class="choice-power">⭐ PWR ${f._power}</div>
    `;
    card.onclick = () => selectFakemon(f.id);
    grid.appendChild(card);
  });
  dlog(`Select screen ready with ${ALL_FAKEMON.length} fighters`, 'ok');
}

function selectFakemon(id) {
  selectedId = id;
  document.querySelectorAll('.fakemon-choice').forEach(el =>
    el.classList.toggle('selected', el.dataset.id === id)
  );
  document.getElementById('start-btn').disabled = false;
  const player = ALL_FAKEMON.find(f => f.id === id);
  const enemy  = pickEnemy(player, ALL_FAKEMON);
  const hint   = document.getElementById('matchup-hint');
  const { text, cls } = matchupLabel(player._power, enemy._power);
  hint.textContent = text;
  hint.className   = cls;
  dlog(`Selected: ${player.name} (PWR ${player._power}) — likely opponent: ${enemy.name} (PWR ${enemy._power})`, 'info');
}

document.getElementById('start-btn').onclick = () => {
  if (selectedId) startBattle(selectedId);
};

// ════════════════════════════════════════════════════════════════════════
//  FIGHTER STATE
// ════════════════════════════════════════════════════════════════════════

function mkFighter(f) {
  // Accept both "atk" (new) and "power" (legacy) field names
  const atkVal = f.atk ?? f.power ?? 100;
  dlog(`  mkFighter: ${f.name} — ATK=${atkVal} HP=${f.hp ?? 100} SPD=${f.speed ?? 90} DEF=${f.defense ?? 10} ACC=${f.accuracy ?? 90}`, 'info');
  return {
    ...f,
    hp:    f.hp    ?? 100,
    maxHp: f.hp    ?? 100,
    atk:      atkVal,
    speed:    f.speed    ?? 90,
    defense:  f.defense  ?? 10,
    accuracy: f.accuracy ?? 90,
    atkMod:      0,
    speedMod:    0,
    defenseMod:  0,
    accuracyMod: 0,
    statuses:     [],
    sleepTurns:   0,
    confuseTurns: 0,
    // Per-stat tracking so each stat type can expire independently
    statupTurns:  { atk: 0, speed: 0, defense: 0, accuracy: 0 },
    statdwnTurns: { atk: 0, speed: 0, defense: 0, accuracy: 0 },
    flinched:     false,
  };
}

const effAtk      = f => Math.max(10,  f.atk      + f.atkMod);
const effSpeed    = f => Math.max(1,   f.speed    + f.speedMod);
const effDefense  = f => Math.max(0,   Math.min(80, f.defense  + f.defenseMod));
const effAccuracy = f => Math.max(10,  Math.min(100, f.accuracy + f.accuracyMod));

// ════════════════════════════════════════════════════════════════════════
//  BATTLE START
// ════════════════════════════════════════════════════════════════════════

function startBattle(playerId) {
  const pBase = ALL_FAKEMON.find(f => f.id === playerId);
  const eBase = pickEnemy(pBase, ALL_FAKEMON);
  dlog(`=== BATTLE START ===`, 'battle');
  dlog(`${pBase.name} (PWR ${pBase._power}) vs ${eBase.name} (PWR ${eBase._power})`, 'battle');
  dlog(`Player: HP=${pBase.hp} ATK=${pBase.atk ?? pBase.power ?? 100} SPD=${pBase.speed ?? 90} DEF=${pBase.defense ?? 10} ACC=${pBase.accuracy ?? 90}`, 'battle');
  dlog(`Enemy:  HP=${eBase.hp} ATK=${eBase.atk ?? eBase.power ?? 100} SPD=${eBase.speed ?? 90} DEF=${eBase.defense ?? 10} ACC=${eBase.accuracy ?? 90}`, 'battle');

  state = {
    player: mkFighter(pBase),
    enemy:  mkFighter(eBase),
    turn: 1,
    busy: false,
    over: false,
  };
  buildMoveGrid();
  render();
  const { text } = matchupLabel(pBase._power, eBase._power);
  setLog(`⚔️ ${pBase.name} (PWR ${pBase._power}) vs ${eBase.name} (PWR ${eBase._power})! ${text}`);
  show('screen-battle');
}

function buildMoveGrid() {
  const grid = document.getElementById('moves-grid');
  grid.innerHTML = '';
  dlog(`Building move grid for ${state.player.name} (${state.player.moves.length} moves)`, 'info');

  state.player.moves.forEach(move => {
    const btn     = document.createElement('button');
    btn.className = 'move-btn';
    const isHeal  = move.damage && move.damage[1] < 0;
    const dmgText = isHeal
      ? `Restores ${Math.abs(move.damage[0])} HP`
      : (move.damage && move.damage[1] > 0)
        ? `${move.damage[0]}–${move.damage[1]} dmg`
        : 'No damage';

    // Build status hint for display (supports multi-status)
    const statuses = getMoveStatuses(move);
    const statusHint = statuses.map(se =>
      `${STATUS_EMOJI[se.status] || ''}${se.status}${se.statusChance < 1 ? ` (${Math.round(se.statusChance * 100)}%)` : ''}`
    ).join(' + ');

    btn.innerHTML = `
      <div class="mn">${move.name}</div>
      <div class="md">${move.desc || dmgText}</div>
      <div class="ms">
        <span class="speed-${move.speed || 'medium'}">${move.speed || 'medium'}</span>
        ${statusHint ? ` · ${statusHint}` : ''}
      </div>
    `;
    btn.onclick = () => doPlayerMove(move);
    grid.appendChild(btn);

    dlog(`  Move: ${move.name} | spd=${move.speed} | dmg=${JSON.stringify(move.damage)} | statuses: ${statuses.length > 0 ? JSON.stringify(statuses) : 'none'}`, 'info');
  });
}

// ════════════════════════════════════════════════════════════════════════
//  TURN LOOP
// ════════════════════════════════════════════════════════════════════════

const rand  = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const clamp = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
const delay = ms => new Promise(r => setTimeout(r, ms));

async function doPlayerMove(move) {
  if (state.busy || state.over) return;
  state.busy = true;
  disableMoves(true);

  const { player, enemy } = state;
  const enemyMove = enemy.moves[rand(0, enemy.moves.length - 1)];

  dlog(`--- Turn ${state.turn} ---`, 'battle');
  dlog(`${player.name} → [${move.name}]  |  ${enemy.name} → [${enemyMove.name}]`, 'battle');

  const tierP = SPEED_ORDER[move.speed]      || 2;
  const tierE = SPEED_ORDER[enemyMove.speed] || 2;
  const playerFirst = tierP < tierE
    || (tierP === tierE && effSpeed(player) >= effSpeed(enemy));

  dlog(`Speed: ${player.name} tier=${tierP} eff=${effSpeed(player)} | ${enemy.name} tier=${tierE} eff=${effSpeed(enemy)} → ${playerFirst ? player.name : enemy.name} goes first`, 'battle');

  let log = '';
  if (playerFirst) {
    log += await runAction(player, enemy, move, 'player-emoji', true);
    if (!checkDead()) {
      log += await runAction(enemy, player, enemyMove, 'enemy-emoji', false);
    }
  } else {
    log += await runAction(enemy, player, enemyMove, 'enemy-emoji', false);
    if (!checkDead()) {
      log += await runAction(player, enemy, move, 'player-emoji', true);
    }
  }

  if (!state.over) {
    log += tickStatuses(player);
    log += tickStatuses(enemy);
    render();
    checkDead();
  }

  state.turn++;
  setLog(log.trim() || '…');
  render();

  dlog(`End of turn: ${player.name} HP=${player.hp}/${player.maxHp} | ${enemy.name} HP=${enemy.hp}/${enemy.maxHp}`, 'battle');

  if (!state.over) {
    state.busy = false;
    disableMoves(false);
  }
}

// ── Run one fighter's action ──────────────────────────────────────────────
async function runAction(attacker, defender, move, emojiId, wentFirst) {
  let msg = '';

  if (attacker.flinched) {
    attacker.flinched = false;
    msg += ` 😦 ${attacker.name} flinched and couldn't move!`;
    dlog(`  ${attacker.name} flinched — turn skipped`, 'battle');
    render();
    return msg;
  }

  const actResult = canAct(attacker);
  msg += actResult.msg;
  if (!actResult.can) {
    dlog(`  ${attacker.name} couldn't act: ${actResult.msg.trim()}`, 'battle');
    render();
    return msg;
  }

  animatePop(emojiId);
  await delay(280);

  // Accuracy check
  const accRoll = Math.random() * 100;
  const accThreshold = effAccuracy(attacker);
  if (accRoll > accThreshold) {
    msg += ` ${attacker.name}'s move missed!`;
    dlog(`  ${attacker.name} missed! (rolled ${accRoll.toFixed(1)}, needed ≤ ${accThreshold})`, 'warn');
    render();
    return msg;
  }

  const isHeal = move.damage && move.damage[1] < 0;

  if (isHeal) {
    // ── Heal move ──
    const amt = Math.abs(move.damage[0]);
    const before = attacker.hp;
    attacker.hp = Math.min(attacker.maxHp, attacker.hp + amt);
    msg += ` 💊 ${attacker.name} recovered ${amt} HP!`;
    dlog(`  ${attacker.name} healed: ${before} → ${attacker.hp} / ${attacker.maxHp}`, 'ok');

  } else if (move.damage && move.damage[1] > 0) {
    // ── Damage move ──
    const base    = rand(move.damage[0], move.damage[1]);
    const { dmg, typeMsg } = dealDamage(attacker, defender, base, move.speed);
    const typeTag = typeMsg.includes('Super') ? ' [SUPER EFFECTIVE]' : typeMsg.includes('not very') ? ' [NOT VERY EFFECTIVE]' : '';
    msg += ` ${move.name} dealt ${dmg} damage!${typeMsg}`;
    dlog(`  ${attacker.name}→${defender.name}: ${move.name} base=${base} final=${dmg}${typeTag} | defender HP: ${defender.hp + dmg}→${defender.hp}`, 'battle');

    // Apply all statuses from this damage move
    for (const se of getMoveStatuses(move)) {
      if (!se.statusChance) continue;
      const roll = Math.random();
      if (roll < se.statusChance) {
        if (se.status === 'flinch') {
          if (wentFirst) {
            defender.flinched = true;
            msg += ` 😦 ${defender.name} flinched!`;
            dlog(`  ${defender.name} flinched!`, 'battle');
          }
        } else {
          const tgt = (se.status === 'statup') ? attacker : defender;
          applyStatus(tgt, se.status, se.statTarget || null);
          msg += ` ${STATUS_EMOJI[se.status] || ''} ${tgt.name}: ${se.status}!`;
          dlog(`  Status applied: ${se.status}${se.statTarget ? ` (${se.statTarget})` : ''} → ${tgt.name}`, 'ok');
        }
      } else {
        dlog(`  ${se.status} proc'd but missed (rolled ${roll.toFixed(2)}, needed < ${se.statusChance})`, 'info');
      }
    }

  } else {
    // ── Pure status move ──
    const statuses = getMoveStatuses(move);
    if (statuses.length === 0) {
      msg += ` ${move.name} did nothing… (no damage and no status?)`;
      dlog(`  WARNING: move "${move.name}" has no damage and no status — is it configured correctly?`, 'warn');
    }

    for (const se of getMoveStatuses(move)) {
      const chance = se.statusChance ?? 1.0;
      const roll   = Math.random();
      if (roll < chance) {
        if (se.status === 'statup') {
          const t = se.statTarget || 'atk';
          applyStatus(attacker, 'statup', t);
          msg += ` 📈 ${attacker.name}'s ${t} rose!`;
          dlog(`  ${attacker.name} stat-UP: ${t}`, 'ok');
        } else if (se.status === 'statdwn') {
          const t = se.statTarget || 'atk';
          applyStatus(defender, 'statdwn', t);
          msg += ` 📉 ${defender.name}'s ${t} fell!`;
          dlog(`  ${defender.name} stat-DOWN: ${t}`, 'ok');
        } else {
          applyStatus(defender, se.status, se.statTarget || null);
          msg += ` ${STATUS_EMOJI[se.status] || ''} ${defender.name} is ${se.status}!`;
          dlog(`  Status applied: ${se.status} → ${defender.name}`, 'ok');
        }
      } else {
        msg += ` ${move.name} missed! (${se.status})`;
        dlog(`  ${se.status} status missed (rolled ${roll.toFixed(2)}, needed < ${chance})`, 'info');
      }
    }
  }

  render();
  return msg;
}

// ── Damage formula ────────────────────────────────────────────────────────
function dealDamage(attacker, defender, base, moveSpeed) {
  const atkMult   = effAtk(attacker) / 100;
  const spdMult   = SPEED_MULT[moveSpeed] || 1.0;
  const typeMult  = FakemonScorer.typeMultiplier(attacker.type, defender.type);
  const defMult   = 1 - effDefense(defender) / 100;
  const raw = Math.max(1, Math.round(base * atkMult * spdMult * typeMult * defMult));
  defender.hp = Math.max(0, defender.hp - raw);
  dlog(`  Damage calc: base=${base} × atk${atkMult.toFixed(2)} × spd${spdMult.toFixed(2)} × type${typeMult} × def${defMult.toFixed(2)} = ${raw}`, 'info');

  let typeMsg = '';
  if (typeMult === 2)   typeMsg = ' <span class="type-super">Super effective!</span>';
  if (typeMult === 0.5) typeMsg = ' <span class="type-weak">Not very effective.</span>';
  return { dmg: raw, typeMsg };
}

// ── Status application ────────────────────────────────────────────────────
function applyStatus(fighter, status, statTarget) {
  if (status === 'flinch') { fighter.flinched = true; return; }
  if (fighter.statuses.includes(status)) {
    dlog(`  ${fighter.name} already has ${status} — not stacking`, 'info');
    return;
  }
  if (PRIMARY_STATUSES.includes(status) &&
      PRIMARY_STATUSES.some(s => fighter.statuses.includes(s))) {
    dlog(`  ${fighter.name} already has a primary status — ${status} blocked`, 'info');
    return;
  }

  fighter.statuses.push(status);
  dlog(`  → ${fighter.name} gains status: ${status}${statTarget ? ` (target: ${statTarget})` : ''}`, 'ok');

  if (status === 'sleep')    { fighter.sleepTurns   = rand(2, 3); dlog(`  sleepTurns set to ${fighter.sleepTurns}`, 'info'); }
  if (status === 'confuse')  { fighter.confuseTurns = rand(2, 4); dlog(`  confuseTurns set to ${fighter.confuseTurns}`, 'info'); }
  if (status === 'paralyze') { fighter.speedMod -= 30;   dlog(`  paralyze: speed −30 (now ${effSpeed(fighter)})`, 'info'); }
  if (status === 'burn')     { fighter.atkMod   -= 20;   dlog(`  burn: atk −20 (now ${effAtk(fighter)})`, 'info'); }

  if (status === 'statup') {
    const t = statTarget || 'atk';
    if (t === 'atk' || t === 'power') { fighter.atkMod      += 20; fighter.statupTurns.atk      = 3; dlog(`  statup: atk +20 for 3 turns (now ${effAtk(fighter)})`, 'info'); }
    if (t === 'speed')                { fighter.speedMod    += 20; fighter.statupTurns.speed    = 3; dlog(`  statup: speed +20 for 3 turns (now ${effSpeed(fighter)})`, 'info'); }
    if (t === 'defense')              { fighter.defenseMod  += 15; fighter.statupTurns.defense  = 3; dlog(`  statup: defense +15 for 3 turns (now ${effDefense(fighter)})`, 'info'); }
    if (t === 'accuracy')             { fighter.accuracyMod += 15; fighter.statupTurns.accuracy = 3; dlog(`  statup: accuracy +15 for 3 turns (now ${effAccuracy(fighter)})`, 'info'); }
  }
  if (status === 'statdwn') {
    const t = statTarget || 'atk';
    if (t === 'atk' || t === 'power') { fighter.atkMod      -= 20; fighter.statdwnTurns.atk      = 3; dlog(`  statdwn: atk −20 for 3 turns (now ${effAtk(fighter)})`, 'info'); }
    if (t === 'speed')                { fighter.speedMod    -= 20; fighter.statdwnTurns.speed    = 3; dlog(`  statdwn: speed −20 for 3 turns (now ${effSpeed(fighter)})`, 'info'); }
    if (t === 'defense')              { fighter.defenseMod  -= 15; fighter.statdwnTurns.defense  = 3; dlog(`  statdwn: defense −15 for 3 turns (now ${effDefense(fighter)})`, 'info'); }
    if (t === 'accuracy')             { fighter.accuracyMod -= 15; fighter.statdwnTurns.accuracy = 3; dlog(`  statdwn: accuracy −15 for 3 turns (now ${effAccuracy(fighter)})`, 'info'); }
  }
}

function removeStatus(fighter, status) {
  fighter.statuses = fighter.statuses.filter(s => s !== status);
  dlog(`  ${fighter.name} lost status: ${status}`, 'info');
}

// ── Pre-action checks ─────────────────────────────────────────────────────
function canAct(fighter) {
  if (fighter.statuses.includes('sleep')) {
    fighter.sleepTurns--;
    dlog(`  ${fighter.name} sleep tick (${fighter.sleepTurns} turns left)`, 'info');
    if (fighter.sleepTurns <= 0) {
      removeStatus(fighter, 'sleep');
      return { can: true, msg: ` 💤 ${fighter.name} woke up!` };
    }
    return { can: false, msg: ` 💤 ${fighter.name} is fast asleep…` };
  }
  if (fighter.statuses.includes('paralyze') && Math.random() < 0.35) {
    dlog(`  ${fighter.name} paralysis triggered — skipping turn`, 'info');
    return { can: false, msg: ` ⚡ ${fighter.name} is paralyzed and can't move!` };
  }
  if (fighter.statuses.includes('confuse') && Math.random() < 0.33) {
    const dmg = rand(8, 15);
    fighter.hp = Math.max(0, fighter.hp - dmg);
    dlog(`  ${fighter.name} hurt itself from confusion (${dmg} dmg)`, 'warn');
    return { can: false, msg: ` 😵 ${fighter.name} hurt itself for ${dmg}!` };
  }
  return { can: true, msg: '' };
}

// ── End-of-turn status ticks ──────────────────────────────────────────────
function tickStatuses(fighter) {
  let msg = '';

  if (fighter.statuses.includes('burn')) {
    const d = Math.round(fighter.maxHp * 0.06);
    fighter.hp = Math.max(0, fighter.hp - d);
    msg += ` 🔴 ${fighter.name} took ${d} burn damage!`;
    dlog(`  ${fighter.name} burn tick: −${d} HP`, 'info');
  }
  if (fighter.statuses.includes('poison')) {
    const d = Math.round(fighter.maxHp * 0.08);
    fighter.hp = Math.max(0, fighter.hp - d);
    msg += ` 🟣 ${fighter.name} took ${d} poison damage!`;
    dlog(`  ${fighter.name} poison tick: −${d} HP`, 'info');
  }
  if (fighter.statuses.includes('confuse')) {
    fighter.confuseTurns--;
    if (fighter.confuseTurns <= 0) {
      removeStatus(fighter, 'confuse');
      msg += ` 😵 ${fighter.name} snapped out of confusion!`;
    }
  }

  // Per-stat statup expiry
  let anyStatup = false;
  for (const stat of ['atk','speed','defense','accuracy']) {
    if (fighter.statupTurns[stat] > 0) {
      fighter.statupTurns[stat]--;
      anyStatup = true;
      if (fighter.statupTurns[stat] === 0) {
        if (stat === 'atk')      fighter.atkMod      = Math.max(0, fighter.atkMod      - 20);
        if (stat === 'speed')    fighter.speedMod    = Math.max(0, fighter.speedMod    - 20);
        if (stat === 'defense')  fighter.defenseMod  = Math.max(0, fighter.defenseMod  - 15);
        if (stat === 'accuracy') fighter.accuracyMod = Math.max(0, fighter.accuracyMod - 15);
        dlog(`  ${fighter.name} statup[${stat}] expired`, 'info');
        msg += ` 📈 ${fighter.name}'s ${stat} boost faded.`;
      } else {
        anyStatup = true; // still active
      }
    }
  }
  if (!anyStatup && fighter.statuses.includes('statup')) removeStatus(fighter, 'statup');

  // Per-stat statdown expiry
  let anyStatdwn = false;
  for (const stat of ['atk','speed','defense','accuracy']) {
    if (fighter.statdwnTurns[stat] > 0) {
      fighter.statdwnTurns[stat]--;
      anyStatdwn = true;
      if (fighter.statdwnTurns[stat] === 0) {
        if (stat === 'atk')      fighter.atkMod      = Math.min(0, fighter.atkMod      + 20);
        if (stat === 'speed')    fighter.speedMod    = Math.min(0, fighter.speedMod    + 20);
        if (stat === 'defense')  fighter.defenseMod  = Math.min(0, fighter.defenseMod  + 15);
        if (stat === 'accuracy') fighter.accuracyMod = Math.min(0, fighter.accuracyMod + 15);
        dlog(`  ${fighter.name} statdwn[${stat}] expired`, 'info');
        msg += ` 📉 ${fighter.name}'s ${stat} drop faded.`;
      } else {
        anyStatdwn = true;
      }
    }
  }
  if (!anyStatdwn && fighter.statuses.includes('statdwn')) removeStatus(fighter, 'statdwn');

  return msg;
}

// ── Win/loss check ────────────────────────────────────────────────────────
function checkDead() {
  if (state.player.hp <= 0) { endBattle(false); return true; }
  if (state.enemy.hp  <= 0) { endBattle(true);  return true; }
  return false;
}

function endBattle(playerWon) {
  state.over = true;
  dlog(`=== BATTLE END: ${playerWon ? state.player.name + ' WON 🏆' : state.player.name + ' LOST 💀'} after ${state.turn} turns ===`,
       playerWon ? 'ok' : 'warn');
  render();
  setTimeout(() => {
    const res = document.getElementById('over-result');
    const det = document.getElementById('over-details');
    const msg = document.getElementById('over-msg');
    if (playerWon) {
      res.textContent = '🏆 YOU WIN!';
      res.style.color = '#f5c842';
      msg.textContent = `${state.player.name} defeated ${state.enemy.name}!`;
    } else {
      res.textContent = '💀 YOU LOST!';
      res.style.color = '#e85d5d';
      msg.textContent = `${state.player.name} fainted…`;
    }
    det.textContent =
      `PWR: ${state.player.name} ${state.player._power} vs ${state.enemy.name} ${state.enemy._power}`;
    show('screen-over');
  }, 500);
}

// ════════════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════════════

function render() {
  ['player', 'enemy'].forEach(side => {
    const f   = state[side];
    const pct = clamp(f.hp / f.maxHp, 0, 1);

    const bar = document.getElementById(`${side}-hp-bar`);
    bar.style.width      = (pct * 100) + '%';
    bar.style.background = pct > 0.5 ? '#56c87a' : pct > 0.25 ? '#e8943a' : '#e85d5d';
    document.getElementById(`${side}-hp-text`).textContent = `${f.hp} / ${f.maxHp}`;

    document.getElementById(`${side}-name`).textContent = f.name;
    const tEl = document.getElementById(`${side}-type`);
    tEl.textContent = f.type || '';
    tEl.className   = `fighter-type type-${f.type || 'Normal'}`;

    document.getElementById(`${side}-emoji`).textContent = f.emoji || '❓';

    document.getElementById(`${side}-stats`).innerHTML = [
      `<span class="stat-mini">⚔️ <span>${effAtk(f)}</span></span>`,
      `<span class="stat-mini">💨 <span>${effSpeed(f)}</span></span>`,
      `<span class="stat-mini">🛡️ <span>${effDefense(f)}%</span></span>`,
      `<span class="stat-mini">🎯 <span>${effAccuracy(f)}%</span></span>`,
    ].join('');

    document.getElementById(`${side}-statuses`).innerHTML =
      f.statuses.map(s => `<span class="status-chip ${STATUS_CHIP_CLASS[s] || ''}">${STATUS_EMOJI[s] || ''} ${s}</span>`).join('')
      + (f.flinched ? `<span class="status-chip status-flinch">😦 flinch</span>` : '');
  });

  const t = state.turn;
  document.getElementById('turn-label').textContent  = `TURN ${t}`;
  document.getElementById('turn-label2').textContent = `TURN ${t}`;

  const diff = state.player._power - state.enemy._power;
  document.getElementById('power-diff-label').textContent =
    diff > 0 ? `▲ +${diff}` : diff < 0 ? `▼ ${diff}` : '≈ even';
}

function setLog(html) {
  document.getElementById('log').innerHTML = html;
}

function disableMoves(disabled) {
  document.querySelectorAll('.move-btn').forEach(b => b.disabled = disabled);
}

function animatePop(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 300);
}

// ════════════════════════════════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ════════════════════════════════════════════════════════════════════════

function show(id) {
  ['screen-loading','screen-select','screen-battle','screen-over'].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.classList.toggle('hidden', s !== id);
  });
  dlog(`Screen: ${id}`, 'info');
}

document.getElementById('flee-btn').onclick = () => {
  if (confirm('Flee the battle?')) {
    dlog('Player fled the battle.', 'warn');
    show('screen-select');
    state = null;
  }
};

document.getElementById('play-again-btn').onclick = () => {
  dlog('Play again — returning to select screen', 'info');
  show('screen-select');
  state = null;
};

loadAll();
